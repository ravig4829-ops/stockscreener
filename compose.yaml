version: '3.8'

services:
  redis:
    image: redis:6.2-alpine
    container_name: my-redis-db
    ports:
      - "6379:6379"
    restart: always

  spring-app:
    build: .
    container_name: my-spring-boot-app
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
          REDIS_URL: redis://redis:6379
