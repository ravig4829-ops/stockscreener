spring.application.name=Stock-Screener
# bind to dynamic PORT provided by Render or fallback 8080
server.port=${PORT:8080}
# don't bind to loopback only
# remove server.address or set to 0.0.0.0 if you really need it
# server.address=0.0.0.0

# Redis: prefer env var SPRING_REDIS_HOST, fallback to localhost
spring.redis.host=${SPRING_REDIS_HOST:127.0.0.1}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.redis.password=${SPRING_REDIS_PASSWORD:}

